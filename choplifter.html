<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHOPLIFTER — a fan homage</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0a12;
    overflow: hidden;
    font-family: "Courier New", monospace;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
  }
  #scanlines {
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.15) 3px, rgba(0,0,0,0) 4px
    );
    mix-blend-mode: multiply;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="512" height="320"></canvas></div>
<div id="scanlines"></div>
<script>
"use strict";
/* ============================================================
   CHOPLIFTER — an original fan homage to the 1982 classic.
   All code and pixel art written from scratch, July 2026.
   Fly right. Blast the barracks doors. Land. Load 16 souls.
   Fly them home. Don't get shot down. Rescue all 64.
   ============================================================ */

const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
const W = 512, H = 320;

// scale canvas to window, integer-ish
function fit() {
  const s = Math.max(1, Math.floor(Math.min(innerWidth / W, innerHeight / H)));
  cvs.style.width  = (W * s) + "px";
  cvs.style.height = (H * s) + "px";
}
addEventListener("resize", fit); fit();

// ---------- palette (Apple II-ish) ----------
const C = {
  sky:    "#0b0b20",
  star:   "#8888aa",
  moon:   "#e8e8d0",
  ground: "#c07020",
  ground2:"#904e10",
  fence:  "#bbbbbb",
  base:   "#3355ee",
  baseLit:"#88aaff",
  white:  "#ffffff",
  green:  "#22dd44",
  purple: "#cc44ff",
  orange: "#ff8800",
  blue:   "#4488ff",
  red:    "#ff3333",
  yellow: "#ffee44",
  dkgray: "#333344",
  tan:    "#e0a860",
  host:   "#ffffff",
  hostRun:"#ffee44"
};

// ---------- world constants ----------
const GROUND   = 280;          // y of ground surface
const WORLD_W  = 3400;
const PAD_X    = 180;          // landing pad center
const FENCE_X  = 430;          // enemies stop here; safe zone to the left
const BASE_X   = 60;           // base building (hostages run inside)
const TOTAL_HOSTAGES = 64;
const MAX_ABOARD = 16;

// ---------- audio ----------
let AC = null, muted = false, rotorOsc = null, rotorGain = null;
function audioInit() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; }
  rotorOsc = AC.createOscillator();
  rotorOsc.type = "sawtooth"; rotorOsc.frequency.value = 30;
  rotorGain = AC.createGain(); rotorGain.gain.value = 0;
  const lp = AC.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 120;
  rotorOsc.connect(lp); lp.connect(rotorGain); rotorGain.connect(AC.destination);
  rotorOsc.start();
}
function sfx(kind) {
  if (!AC || muted) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  if (kind === "shoot") {
    o.type = "square"; o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(220, t + 0.08);
    g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
    o.start(t); o.stop(t + 0.1);
  } else if (kind === "bomb") {
    o.type = "sine"; o.frequency.setValueAtTime(300, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.25);
    g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  } else if (kind === "boom") {
    const n = AC.createBufferSource();
    const buf = AC.createBuffer(1, AC.sampleRate * 0.4, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    n.buffer = buf;
    const ng = AC.createGain(); ng.gain.setValueAtTime(0.25, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    const f = AC.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 800;
    n.connect(f); f.connect(ng); ng.connect(AC.destination);
    n.start(t);
    return;
  } else if (kind === "board") {
    o.type = "square"; o.frequency.setValueAtTime(523, t);
    o.frequency.setValueAtTime(784, t + 0.07);
    g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.start(t); o.stop(t + 0.16);
  } else if (kind === "safe") {
    o.type = "square";
    o.frequency.setValueAtTime(523, t);
    o.frequency.setValueAtTime(659, t + 0.08);
    o.frequency.setValueAtTime(1047, t + 0.16);
    g.gain.setValueAtTime(0.09, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.32);
  } else if (kind === "scream") {
    o.type = "sawtooth"; o.frequency.setValueAtTime(1200, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.2);
    g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.start(t); o.stop(t + 0.24);
  }
}
function rotorUpdate() {
  if (!rotorGain) return;
  const flying = mode === "play" && chopper.alive;
  const target = (flying && !muted) ? (chopper.landed ? 0.02 : 0.045) : 0;
  rotorGain.gain.setTargetAtTime(target, AC.currentTime, 0.1);
  if (rotorOsc) rotorOsc.frequency.setTargetAtTime(chopper.landed ? 22 : 30 + Math.abs(chopper.vx) * 3, AC.currentTime, 0.1);
}

// ---------- input ----------
const keys = {};
addEventListener("keydown", e => {
  audioInit();
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  if (e.repeat) return;
  keys[e.key.toLowerCase()] = true;
  if (e.key === " ") keys.space = true;
  if (e.key.toLowerCase() === "m") muted = !muted;
  if (mode === "title" && (e.key === "Enter" || e.key === " ")) startGame();
  else if ((mode === "gameover" || mode === "win") && (e.key === "Enter" || e.key === " " || e.key.toLowerCase() === "r")) { mode = "title"; }
  if (mode === "play" && (e.key.toLowerCase() === "x" || e.key === "ArrowDown" && false)) {} // handled in update
});
addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
  if (e.key === " ") keys.space = false;
});
const down = k => !!keys[k];

// ---------- game state ----------
let mode = "title";       // title | play | dying | gameover | win
let frame = 0;
let msg = "", msgT = 0;
function say(s, t) { msg = s; msgT = t || 150; }

const chopper = {
  x: PAD_X, y: GROUND - 11, vx: 0, vy: 0,
  facing: 1,          // -1 left, 0 toward camera, 1 right
  turn: 0,            // frames left in turn animation
  landed: true, alive: true,
  fireCool: 0, bombCool: 0,
  aboard: 0, respawnT: 0
};
let lives, safe, dead, tanksKilled, playT;
let bullets, bombs, shells, missiles, tanks, jets, hostages, barracksList, parts, debris;
let tankTimer, jetTimer;

function makeBarracks(x) {
  return { x, w: 64, h: 40, open: false, inside: 16, releaseT: 0 };
}

function worldInit() {
  lives = 3; safe = 0; dead = 0; tanksKilled = 0; playT = 0;
  bullets = []; bombs = []; shells = []; missiles = [];
  tanks = []; jets = []; parts = []; debris = [];
  hostages = [];
  barracksList = [makeBarracks(800), makeBarracks(1450), makeBarracks(2150), makeBarracks(2850)];
  tankTimer = 400; jetTimer = 2600;
  resetChopper();
}
worldInit();

function startGame() {
  mode = "play";
  worldInit();
  say("RESCUE ALL 64 HOSTAGES!", 220);
}
function resetChopper() {
  chopper.x = PAD_X; chopper.y = GROUND - 11;
  chopper.vx = 0; chopper.vy = 0;
  chopper.facing = 1; chopper.turn = 0;
  chopper.landed = true; chopper.alive = true;
  chopper.aboard = 0; chopper.fireCool = 0; chopper.bombCool = 0;
}

// ---------- helpers ----------
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
function boom(x, y, big) {
  sfx("boom");
  const n = big ? 26 : 14;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = Math.random() * (big ? 3 : 2);
    parts.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1,
      t: 20 + Math.random() * 25,
      c: [C.orange, C.yellow, C.red, C.white][Math.floor(Math.random() * 4)]
    });
  }
}
function killHostagesNear(x, y, r) {
  for (const h of hostages) {
    if (h.state === "dead" || h.state === "aboard" || h.state === "safe") continue;
    if (Math.abs(h.x - x) < r && Math.abs(h.y - y) < r + 8) {
      h.state = "dead"; dead++; sfx("scream");
      parts.push({ x: h.x, y: h.y - 4, vx: 0, vy: -0.4, t: 40, c: C.red });
    }
  }
}

// ---------- update ----------
function update() {
  frame++;
  if (msgT > 0) msgT--;
  rotorUpdate();
  if (mode !== "play" && mode !== "dying") return;
  playT++;

  if (mode === "dying") {
    chopper.respawnT--;
    updateParticles();
    if (chopper.respawnT <= 0) {
      if (lives <= 0) { mode = "gameover"; }
      else { mode = "play"; resetChopper(); }
    }
    return;
  }

  // ----- chopper control -----
  const ch = chopper;
  if (ch.alive) {
    let ax = 0;
    if (down("arrowleft") || down("a"))  ax -= 0.14;
    if (down("arrowright") || down("d")) ax += 0.14;
    let ay = 0;
    if (down("arrowup") || down("w"))    ay -= 0.13;
    if (down("arrowdown") || down("s"))  ay += 0.13;

    // facing follows horizontal intent; X toggles hover-face (bomb mode)
    if (ax < 0 && ch.facing !== -1) { ch.facing = -1; ch.turn = 8; }
    if (ax > 0 && ch.facing !== 1)  { ch.facing = 1;  ch.turn = 8; }
    if (down("x") && !ch._xHeld) { ch.facing = 0; ch.turn = 8; ch._xHeld = true; }
    if (!down("x")) ch._xHeld = false;
    if (ch.turn > 0) ch.turn--;

    ch.vx = clamp((ch.vx + ax) * 0.985, -3.4, 3.4);
    ch.vy = clamp((ch.vy + ay + 0.02) * 0.96, -2.2, 2.2); // slight gravity

    ch.x = clamp(ch.x + ch.vx, 20, WORLD_W - 20);
    ch.y += ch.vy;
    if (ch.y < 24) { ch.y = 24; ch.vy = Math.max(0, ch.vy); }

    // ground contact
    const floorY = GROUND - 11;
    if (ch.y >= floorY) {
      if (ch.vy > 2.0 || Math.abs(ch.vx) > 1.6) { crashChopper(); }
      else {
        ch.y = floorY; ch.vy = 0;
        ch.vx *= 0.8;
        if (Math.abs(ch.vx) < 0.05) ch.vx = 0;
        ch.landed = true;
      }
    } else ch.landed = false;

    // collide with barracks buildings
    for (const b of barracksList) {
      if (ch.x > b.x - b.w/2 - 10 && ch.x < b.x + b.w/2 + 10 &&
          ch.y > GROUND - b.h - 8) { crashChopper(); break; }
    }

    // ----- firing -----
    if (ch.fireCool > 0) ch.fireCool--;
    if (ch.bombCool > 0) ch.bombCool--;
    if (down("space") && ch.alive) {
      if (ch.facing !== 0 && ch.fireCool === 0) {
        sfx("shoot");
        bullets.push({ x: ch.x + ch.facing * 18, y: ch.y + 2, vx: ch.facing * 6.5 + ch.vx, vy: 0.35, t: 70 });
        ch.fireCool = 9;
      } else if (ch.facing === 0 && ch.bombCool === 0) {
        sfx("bomb");
        bombs.push({ x: ch.x, y: ch.y + 8, vx: ch.vx * 0.5, vy: 1 });
        ch.bombCool = 26;
      }
    }
  }

  // ----- bullets -----
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.t--;
    let gone = b.t <= 0 || b.y >= GROUND;
    if (b.y >= GROUND) { parts.push({x:b.x,y:GROUND-2,vx:0,vy:-0.5,t:8,c:C.tan}); killHostagesNear(b.x, GROUND, 4); }
    // barracks doors
    if (!gone) for (const bar of barracksList) {
      if (Math.abs(b.x - bar.x) < bar.w/2 && b.y > GROUND - bar.h) {
        gone = true;
        if (!bar.open) { bar.open = true; bar.releaseT = 30; say("THE DOOR IS OPEN!", 130); sfx("safe"); }
        break;
      }
    }
    // tanks
    if (!gone) for (const t of tanks) {
      if (!t.dead && Math.abs(b.x - t.x) < 14 && b.y > GROUND - 14) {
        t.hp--; gone = true;
        if (t.hp <= 0) { t.dead = true; tanksKilled++; boom(t.x, GROUND - 8, true); killHostagesNear(t.x, GROUND, 16); }
        else parts.push({x:b.x,y:b.y,vx:0,vy:-0.5,t:8,c:C.white});
        break;
      }
    }
    // jets
    if (!gone) for (const j of jets) {
      if (!j.dead && Math.abs(b.x - j.x) < 14 && Math.abs(b.y - j.y) < 8) {
        j.dead = true; gone = true; boom(j.x, j.y, true);
        break;
      }
    }
    // hostages (friendly fire!)
    if (!gone) for (const h of hostages) {
      if ((h.state === "out" || h.state === "torescue" || h.state === "tobase") &&
          Math.abs(b.x - h.x) < 3 && Math.abs(b.y - (h.y - 4)) < 5) {
        h.state = "dead"; dead++; gone = true; sfx("scream");
        say("YOU SHOT A HOSTAGE!", 150);
        break;
      }
    }
    if (gone) bullets.splice(i, 1);
  }

  // ----- bombs -----
  for (let i = bombs.length - 1; i >= 0; i--) {
    const b = bombs[i];
    b.vy += 0.12; b.x += b.vx; b.y += b.vy;
    let hit = false;
    for (const t of tanks) {
      if (!t.dead && Math.abs(b.x - t.x) < 15 && b.y > GROUND - 16) {
        t.dead = true; tanksKilled++; hit = true;
        boom(t.x, GROUND - 8, true); killHostagesNear(t.x, GROUND, 16);
        break;
      }
    }
    if (!hit) for (const bar of barracksList) {
      if (Math.abs(b.x - bar.x) < bar.w/2 && b.y > GROUND - bar.h) {
        hit = true; boom(b.x, GROUND - bar.h, false);
        if (!bar.open) { bar.open = true; bar.releaseT = 30; say("THE DOOR IS OPEN!", 130); }
        break;
      }
    }
    if (!hit && b.y >= GROUND) {
      hit = true; boom(b.x, GROUND - 3, false); killHostagesNear(b.x, GROUND, 14);
    }
    if (hit) bombs.splice(i, 1);
  }

  // ----- tanks -----
  tankTimer--;
  if (tankTimer <= 0 && tanks.filter(t => !t.dead).length < 3) {
    // spawn far from chopper, to the right of the fence
    let sx = chopper.x + (Math.random() < 0.5 ? -420 : 420);
    sx = clamp(sx, FENCE_X + 120, WORLD_W - 40);
    tanks.push({ x: sx, y: GROUND, vx: 0, hp: 2, dead: false, fireT: 90 + Math.random() * 90, deadT: 0 });
    tankTimer = 500 + Math.random() * 500;
  }
  for (let i = tanks.length - 1; i >= 0; i--) {
    const t = tanks[i];
    if (t.dead) { t.deadT++; if (t.deadT > 260) tanks.splice(i, 1); continue; }
    // drive toward the chopper's side of the world, but never past the fence
    const want = clamp(chopper.x, FENCE_X + 30, WORLD_W - 30);
    const dx = want - t.x;
    t.x += clamp(dx, -0.45, 0.45);
    // crush hostages
    killHostagesNear(t.x, GROUND, 10);
    // fire at chopper
    t.fireT--;
    if (t.fireT <= 0 && chopper.alive && !chopper.landed) {
      const d = Math.hypot(chopper.x - t.x, chopper.y - (GROUND - 10));
      if (d < 300) {
        const s = 2.4;
        shells.push({
          x: t.x, y: GROUND - 12,
          vx: (chopper.x - t.x) / d * s + chopper.vx * 0.3,
          vy: (chopper.y - (GROUND - 12)) / d * s,
          t: 160
        });
        sfx("shoot");
      }
      t.fireT = 140 + Math.random() * 100;
    }
  }

  // ----- jets (show up once you start winning) -----
  if (safe + dead >= 8 || playT > 5400) {
    jetTimer--;
    if (jetTimer <= 0 && jets.filter(j => !j.dead).length < 1 && chopper.alive && !chopper.landed && chopper.x > FENCE_X) {
      const fromLeft = Math.random() < 0.5;
      jets.push({
        x: chopper.x + (fromLeft ? -300 : 300),
        y: clamp(chopper.y + (Math.random() * 30 - 15), 30, GROUND - 40),
        vx: fromLeft ? 4.2 : -4.2, dead: false, deadT: 0, fired: false
      });
      say("ENEMY JET!", 110);
      jetTimer = 900 + Math.random() * 700;
    }
  }
  for (let i = jets.length - 1; i >= 0; i--) {
    const j = jets[i];
    if (j.dead) { j.deadT++; if (j.deadT > 40) jets.splice(i, 1); continue; }
    j.x += j.vx;
    if (!j.fired && Math.abs(j.x - chopper.x) < 200 && Math.sign(chopper.x - j.x) === Math.sign(j.vx)) {
      j.fired = true;
      missiles.push({ x: j.x, y: j.y, vx: j.vx * 1.15, vy: 0, t: 130 });
    }
    if (j.x < chopper.x - 600 || j.x > chopper.x + 600) jets.splice(i, 1);
  }

  // ----- enemy projectiles -----
  for (let i = shells.length - 1; i >= 0; i--) {
    const s = shells[i]; s.x += s.vx; s.y += s.vy; s.t--;
    let gone = s.t <= 0;
    if (s.y >= GROUND) { boom(s.x, GROUND - 3, false); killHostagesNear(s.x, GROUND, 10); gone = true; }
    if (!gone && chopper.alive && Math.abs(s.x - chopper.x) < 15 && Math.abs(s.y - chopper.y) < 9) {
      crashChopper(); gone = true;
    }
    if (gone) shells.splice(i, 1);
  }
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    m.vy += clamp((chopper.y - m.y) * 0.004, -0.06, 0.06); // mild homing
    m.x += m.vx; m.y += m.vy; m.t--;
    let gone = m.t <= 0;
    if (m.y >= GROUND) { boom(m.x, GROUND - 3, false); killHostagesNear(m.x, GROUND, 10); gone = true; }
    if (!gone && chopper.alive && Math.abs(m.x - chopper.x) < 16 && Math.abs(m.y - chopper.y) < 9) {
      crashChopper(); gone = true;
    }
    if (gone) missiles.splice(i, 1);
  }

  // ----- barracks release -----
  for (const bar of barracksList) {
    if (bar.open && bar.inside > 0) {
      bar.releaseT--;
      if (bar.releaseT <= 0) {
        bar.inside--;
        hostages.push({
          x: bar.x + (Math.random() * 10 - 5), y: GROUND,
          home: bar.x, state: "out", anim: Math.random() * 100, wanderT: 0, dir: Math.random() < 0.5 ? -1 : 1
        });
        bar.releaseT = 26 + Math.random() * 30;
      }
    }
  }

  // ----- hostages -----
  const canBoard = chopper.alive && chopper.landed && chopper.aboard < MAX_ABOARD && chopper.x > FENCE_X;
  for (const h of hostages) {
    if (h.state === "dead" || h.state === "aboard" || h.state === "safe") continue;
    h.anim++;
    if (h.state === "tobase") {
      h.x -= 0.9;
      if (h.x <= BASE_X + 18) { h.state = "safe"; safe++; sfx("safe"); }
      continue;
    }
    const dxc = chopper.x - h.x;
    if (canBoard && Math.abs(dxc) < 150) {
      h.run = true;
      h.x += clamp(dxc, -0.9, 0.9);
      if (Math.abs(dxc) < 7) {
        h.state = "aboard"; chopper.aboard++; sfx("board");
        if (chopper.aboard === MAX_ABOARD) say("16 ABOARD — CHOPPER FULL!", 150);
      }
    } else {
      h.run = false;
      // wave at a passing chopper, otherwise mill about near home
      if (!(chopper.alive && !chopper.landed && Math.abs(dxc) < 110)) {
        h.wanderT--;
        if (h.wanderT <= 0) { h.dir = Math.random() < 0.5 ? -1 : 1; h.wanderT = 40 + Math.random() * 120; }
        h.x += h.dir * 0.25;
        h.x = clamp(h.x, h.home - 70, h.home + 70);
      }
    }
  }

  // ----- unload at the pad -----
  if (chopper.alive && chopper.landed && chopper.aboard > 0 && Math.abs(chopper.x - PAD_X) < 40) {
    if (!chopper.unloadT || chopper.unloadT <= 0) {
      chopper.aboard--;
      const h = hostages.find(q => q.state === "aboard");
      if (h) { h.state = "tobase"; h.x = chopper.x - 12; h.y = GROUND; }
      chopper.unloadT = 22;
    } else chopper.unloadT--;
  }

  updateParticles();

  // ----- end conditions -----
  if (safe + dead >= TOTAL_HOSTAGES) {
    mode = "win";
  }
}

function updateParticles() {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.t--;
    if (p.y > GROUND) { p.y = GROUND; p.vy *= -0.3; }
    if (p.t <= 0) parts.splice(i, 1);
  }
}

function crashChopper() {
  if (!chopper.alive) return;
  chopper.alive = false;
  boom(chopper.x, chopper.y, true);
  boom(chopper.x + 8, chopper.y + 4, true);
  if (chopper.aboard > 0) {
    dead += chopper.aboard;
    say(chopper.aboard + " HOSTAGES LOST IN THE CRASH", 200);
    chopper.aboard = 0;
  }
  lives--;
  mode = "dying";
  chopper.respawnT = 100;
}

// ---------- drawing ----------
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(Math.round(x), Math.round(y), w, h); }

let camX = 0;
function draw() {
  // camera
  const targetCam = clamp(chopper.x - W / 2, 0, WORLD_W - W);
  camX += (targetCam - camX) * 0.15;
  const cx = Math.round(camX);

  // sky
  ctx.fillStyle = C.sky; ctx.fillRect(0, 0, W, H);
  // stars (fixed pattern, parallax)
  ctx.fillStyle = C.star;
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137 + 31) % (WORLD_W)) - cx * 0.3;
    const sy = (i * 53 + 17) % (GROUND - 60);
    const wx = ((sx % W) + W) % W;
    if ((i + (frame >> 4)) % 11 !== 0) ctx.fillRect(wx, sy, 1, 1);
  }
  // moon
  const moonX = ((160 - cx * 0.15) % (W + 80) + (W + 80)) % (W + 80) - 40;
  px(moonX, 34, 18, 18, C.moon);
  px(moonX + 3, 31, 12, 24, C.moon);
  px(moonX - 3, 37, 24, 12, C.moon);
  px(moonX + 11, 38, 4, 4, "#c8c8b0");
  px(moonX + 4, 44, 3, 3, "#c8c8b0");

  // distant dunes
  ctx.fillStyle = "#2a1a30";
  for (let i = 0; i < 8; i++) {
    const dx = ((i * 520 - cx * 0.5) % (WORLD_W * 0.5) + WORLD_W * 0.5) % (WORLD_W * 0.5) - 200;
    ctx.beginPath();
    ctx.ellipse(dx, GROUND, 180, 34, 0, Math.PI, 0);
    ctx.fill();
  }

  // ground
  px(0, GROUND, W, H - GROUND, C.ground);
  ctx.fillStyle = C.ground2;
  for (let gx = -(cx % 24); gx < W; gx += 24) {
    ctx.fillRect(gx, GROUND + 6, 10, 2);
    ctx.fillRect(gx + 14, GROUND + 16, 8, 2);
    ctx.fillRect(gx + 5, GROUND + 28, 12, 2);
  }

  // ------- world objects (offset by cx) -------
  drawBase(cx);
  drawFence(cx);
  for (const bar of barracksList) drawBarracks(bar, cx);
  for (const h of hostages) drawHostage(h, cx);
  for (const t of tanks) drawTank(t, cx);
  for (const j of jets) drawJet(j, cx);
  if (chopper.alive || mode === "dying") drawChopper(cx);
  ctx.fillStyle = C.white;
  for (const b of bullets) ctx.fillRect(Math.round(b.x - cx) - 1, Math.round(b.y), 3, 2);
  ctx.fillStyle = C.yellow;
  for (const b of bombs) ctx.fillRect(Math.round(b.x - cx) - 1, Math.round(b.y) - 2, 3, 5);
  ctx.fillStyle = C.red;
  for (const s of shells) ctx.fillRect(Math.round(s.x - cx) - 1, Math.round(s.y) - 1, 3, 3);
  for (const m of missiles) {
    px(m.x - cx - 4, m.y - 1, 8, 3, C.white);
    px(m.x - cx - (m.vx > 0 ? 6 : -4), m.y, 3, 2, C.orange);
  }
  for (const p of parts) px(p.x - cx, p.y, 2, 2, p.c);

  drawHUD();

  if (mode === "title") drawTitle();
  if (mode === "gameover") drawEnd("GAME OVER");
  if (mode === "win") drawEnd(safe === TOTAL_HOSTAGES ? "PERFECT RESCUE!" : "MISSION COMPLETE");
}

function drawBase(cx) {
  const x = BASE_X - cx;
  // building
  px(x - 40, GROUND - 34, 80, 34, C.base);
  px(x - 40, GROUND - 40, 80, 8, C.baseLit);
  px(x - 30, GROUND - 26, 12, 10, C.sky);
  px(x - 6, GROUND - 26, 12, 10, C.sky);
  px(x + 18, GROUND - 26, 12, 10, C.sky);
  // door
  px(x + 28, GROUND - 16, 12, 16, C.dkgray);
  // flag
  px(x - 38, GROUND - 64, 2, 26, C.white);
  px(x - 36, GROUND - 64, 14, 8, (frame >> 3) % 2 ? C.red : C.white);
  // landing pad
  const p = PAD_X - cx;
  px(p - 42, GROUND - 2, 84, 4, C.dkgray);
  ctx.fillStyle = (frame >> 4) % 2 ? C.yellow : C.orange;
  ctx.fillRect(p - 42, GROUND - 2, 5, 4);
  ctx.fillRect(p + 37, GROUND - 2, 5, 4);
  ctx.fillStyle = C.white;
  ctx.font = "bold 9px monospace"; ctx.textAlign = "center";
  ctx.fillText("H", p, GROUND + 1 + 0);
}

function drawFence(cx) {
  const x = FENCE_X - cx;
  if (x < -20 || x > W + 20) return;
  for (let y = GROUND - 22; y < GROUND; y += 5) px(x, y, 2, 3, C.fence);
  px(x - 3, GROUND - 22, 8, 2, C.fence);
  px(x - 3, GROUND - 12, 8, 2, C.fence);
}

function drawBarracks(bar, cx) {
  const x = bar.x - cx;
  if (x < -80 || x > W + 80) return;
  const top = GROUND - bar.h;
  px(x - bar.w/2, top, bar.w, bar.h, C.tan);
  // roof
  px(x - bar.w/2 - 4, top - 6, bar.w + 8, 8, C.ground2);
  // door
  if (bar.open) {
    px(x - 8, GROUND - 20, 16, 20, "#000000");
    px(x - 10, GROUND - 20, 3, 20, C.dkgray); // blown door frame
  } else {
    px(x - 8, GROUND - 20, 16, 20, C.dkgray);
    px(x - 2, GROUND - 12, 3, 3, C.yellow);
  }
  // windows
  px(x - 24, top + 8, 8, 7, bar.inside > 0 ? C.yellow : C.sky);
  px(x + 16, top + 8, 8, 7, bar.inside > 8 ? C.yellow : C.sky);
}

function drawHostage(h, cx) {
  if (h.state !== "out" && h.state !== "tobase") return;
  const x = Math.round(h.x - cx), y = GROUND;
  if (x < -10 || x > W + 10) return;
  const running = h.run || h.state === "tobase";
  const step = (Math.floor(h.anim / (running ? 4 : 10)) % 2) === 0;
  const c = running ? C.hostRun : C.host;
  // waving?
  const nearAir = chopper.alive && !chopper.landed && Math.abs(chopper.x - h.x) < 110 && !running && h.state === "out";
  px(x - 1, y - 8, 3, 3, c);              // head
  px(x - 1, y - 5, 3, 3, c);              // body
  if (nearAir) {
    const up = (Math.floor(h.anim / 6) % 2) === 0;
    px(x - 3, y - (up ? 9 : 6), 2, 2, c); // waving arm
    px(x + 2, y - (up ? 6 : 9), 2, 2, c);
  }
  if (step) { px(x - 2, y - 2, 2, 2, c); px(x + 1, y - 2, 2, 2, c); }
  else      { px(x - 1, y - 2, 1, 2, c); px(x + 1, y - 2, 1, 2, c); }
}

function drawTank(t, cx) {
  const x = Math.round(t.x - cx);
  if (x < -30 || x > W + 30) return;
  if (t.dead) {
    px(x - 12, GROUND - 8, 24, 8, C.dkgray);
    if (t.deadT < 120) {
      const fy = GROUND - 12 - (t.deadT % 8);
      px(x - 2, fy, 4, 4, (frame >> 2) % 2 ? C.orange : C.red);
    }
    return;
  }
  px(x - 13, GROUND - 7, 26, 7, C.green);       // treads
  px(x - 10, GROUND - 12, 20, 6, "#118833");    // hull
  px(x - 4, GROUND - 16, 9, 5, "#118833");      // turret
  // barrel aims at chopper
  const dx = chopper.x - t.x, dy = chopper.y - (GROUND - 14);
  const d = Math.hypot(dx, dy) || 1;
  px(x + (dx/d) * 10 - 1, GROUND - 15 + (dy/d) * 6, 3, 2, "#118833");
  // wheels
  ctx.fillStyle = C.dkgray;
  for (let i = 0; i < 5; i++) ctx.fillRect(x - 11 + i * 5 + ((frame >> 3) % 2), GROUND - 4, 3, 3);
}

function drawJet(j, cx) {
  const x = Math.round(j.x - cx), y = Math.round(j.y);
  if (j.dead) { px(x - 4, y - 2, 8, 5, C.orange); return; }
  const f = j.vx > 0 ? 1 : -1;
  px(x - 12, y - 1, 24, 3, C.purple);            // fuselage
  px(x + f * 8, y - 2, 6 * f > 0 ? 6 : 6, 2, C.purple);
  px(x - f * 10, y - 5, 4, 5, C.purple);         // tail
  px(x - 4, y - 3, 8, 2, "#9922cc");             // canopy stripe
  px(x - f * 13, y, 3, 2, (frame >> 1) % 2 ? C.orange : C.yellow); // exhaust
}

function drawChopper(cx) {
  const ch = chopper;
  const x = Math.round(ch.x - cx), y = Math.round(ch.y);
  if (!ch.alive) return;
  const turning = ch.turn > 0;
  const f = turning ? 0 : ch.facing;
  const bob = ch.landed ? 0 : ((frame >> 4) % 2);

  // rotor (spinning)
  const rphase = frame % 4;
  const rw = [26, 18, 6, 18][rphase];
  px(x - rw / 2, y - 9 + bob, rw, 1, C.white);
  px(x - 1, y - 8 + bob, 2, 3, C.dkgray); // mast

  if (f === 0) {
    // facing camera
    px(x - 6, y - 5 + bob, 12, 10, C.blue);
    px(x - 4, y - 3 + bob, 8, 4, C.sky);          // canopy
    px(x - 8, y + 5 + bob, 16, 2, C.dkgray);      // skids
    px(x - 1, y - 5 + bob, 2, 1, C.white);
  } else {
    // side view
    px(x - 8 * f - 4, y - 4 + bob, 14, 9, C.blue);          // body
    px(x + f * 2, y - 3 + bob, 7, 5, C.sky);                // canopy glass
    px(x - f * 16, y - 3 + bob, 12, 3, C.blue);             // tail boom
    const tr = (frame >> 1) % 2;
    px(x - f * 17 - 1, y - 6 + bob, 2, tr ? 8 : 4, C.white);// tail rotor
    px(x - 9, y + 5 + bob, 18, 2, C.dkgray);                // skids
    px(x - 7, y + 3 + bob, 2, 2, C.dkgray);
    px(x + 5, y + 3 + bob, 2, 2, C.dkgray);
  }
  // aboard indicator: little faces in the window when landed... skip; HUD shows it
}

// ---------- HUD ----------
function drawHUD() {
  px(0, 0, W, 22, "#101024");
  px(0, 22, W, 1, C.dkgray);
  ctx.textAlign = "left";
  ctx.font = "bold 10px monospace";

  // three classic counters: aboard / safe / lost
  drawCounter(14,  "ABOARD", chopper.aboard, C.yellow);
  drawCounter(150, "SAFE",   safe,           C.green);
  drawCounter(272, "LOST",   dead,           C.red);

  // lives
  ctx.fillStyle = C.white;
  ctx.fillText("CHOPPERS", 372, 9);
  for (let i = 0; i < Math.max(0, lives === undefined ? 3 : lives); i++) {
    const lx = 372 + i * 18;
    px(lx, 13, 12, 4, C.blue);
    px(lx + 2, 11, 8, 1, C.white);
  }
  if (muted) { ctx.fillStyle = C.dkgray; ctx.fillText("MUTE", 470, 9); }

  // message line
  if (msgT > 0 && msg) {
    ctx.textAlign = "center";
    ctx.fillStyle = (frame >> 3) % 2 ? C.yellow : C.white;
    ctx.font = "bold 11px monospace";
    ctx.fillText(msg, W / 2, 40);
  }

  // direction hint to base when carrying
  if (mode === "play" && chopper.aboard > 0 && chopper.x > 500) {
    ctx.textAlign = "left";
    ctx.fillStyle = (frame >> 4) % 2 ? C.green : "#116622";
    ctx.font = "bold 12px monospace";
    ctx.fillText("<< BASE", 8, 54);
  }
}
function drawCounter(x, label, val, color) {
  ctx.fillStyle = C.white; ctx.textAlign = "left";
  ctx.font = "bold 10px monospace";
  ctx.fillText(label, x, 9);
  // tiny man icon
  px(x + 0, 12, 3, 3, color); px(x + 0, 15, 3, 4, color);
  ctx.fillStyle = color;
  ctx.font = "bold 12px monospace";
  ctx.fillText(String(val).padStart(2, "0"), x + 8, 20);
}

// ---------- screens ----------
function drawTitle() {
  px(0, 0, W, H, "rgba(0,0,20,0.82)");
  ctx.textAlign = "center";
  ctx.fillStyle = C.orange;
  ctx.font = "bold 34px monospace";
  ctx.fillText("CHOPLIFTER", W / 2, 84);
  ctx.fillStyle = C.purple;
  ctx.font = "bold 11px monospace";
  ctx.fillText("A FAN HOMAGE TO THE 1982 APPLE ][ CLASSIC", W / 2, 104);

  // big chopper doodle
  const bx = W / 2, by = 136 + ((frame >> 4) % 2);
  px(bx - 30, by - 10, 60, 2, C.white);
  px(bx - 14, by - 4, 30, 12, C.blue);
  px(bx + 8, by - 2, 9, 6, C.sky);
  px(bx - 36, by - 2, 24, 4, C.blue);
  px(bx - 38, by - 8, 2, ((frame >> 2) % 2) ? 14 : 8, C.white);
  px(bx - 16, by + 9, 34, 2, C.dkgray);

  ctx.fillStyle = C.white;
  ctx.font = "bold 12px monospace";
  ctx.fillText("64 HOSTAGES ARE BEHIND ENEMY LINES.", W / 2, 176);
  ctx.fillText("BRING THEM HOME.", W / 2, 192);

  ctx.fillStyle = C.green;
  ctx.font = "10px monospace";
  ctx.fillText("ARROWS / WASD .... FLY", W / 2, 220);
  ctx.fillText("SPACE ........... FIRE  (SHOOT THE BARRACKS DOOR)", W / 2, 234);
  ctx.fillText("X ............... FACE FORWARD & DROP BOMBS ON TANKS", W / 2, 248);
  ctx.fillText("LAND GENTLY NEAR HOSTAGES. 16 FIT ABOARD.", W / 2, 262);
  ctx.fillText("UNLOAD ON THE  H  PAD AT YOUR BASE. [M] MUTES.", W / 2, 276);

  ctx.fillStyle = (frame >> 4) % 2 ? C.yellow : C.orange;
  ctx.font = "bold 13px monospace";
  ctx.fillText("PRESS ENTER TO FLY", W / 2, 302);
}

function drawEnd(title) {
  px(0, 60, W, 150, "rgba(0,0,20,0.88)");
  ctx.textAlign = "center";
  ctx.fillStyle = title === "GAME OVER" ? C.red : C.green;
  ctx.font = "bold 26px monospace";
  ctx.fillText(title, W / 2, 106);
  ctx.fillStyle = C.white;
  ctx.font = "bold 12px monospace";
  ctx.fillText("RESCUED " + safe + " OF " + TOTAL_HOSTAGES + " HOSTAGES", W / 2, 136);
  if (dead > 0) { ctx.fillStyle = C.red; ctx.fillText(dead + " LOST", W / 2, 154); }
  if (safe === TOTAL_HOSTAGES) {
    ctx.fillStyle = C.yellow;
    ctx.fillText("A FLAWLESS SORTIE, COMMANDER.", W / 2, 154);
  }
  ctx.fillStyle = (frame >> 4) % 2 ? C.yellow : C.orange;
  ctx.fillText("PRESS ENTER FOR TITLE", W / 2, 188);
}

// ---------- main loop ----------
let last = 0, acc = 0;
const STEP = 1000 / 60;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!last) last = ts;
  acc += Math.min(100, ts - last);
  last = ts;
  while (acc >= STEP) { update(); acc -= STEP; }
  draw();
}
requestAnimationFrame(loop);

// expose a little state for automated testing
window.__game = {
  get mode() { return mode; }, chopper, startGame,
  get barracks() { return barracksList; },
  get hostages() { return hostages; },
  get counts() { return { safe, dead, lives, aboard: chopper.aboard }; }
};
</script>
